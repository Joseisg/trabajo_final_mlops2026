steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/trabajo-final-mlops2026-git:$COMMIT_SHA'
      - '-t'
      - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/trabajo-final-mlops2026-git:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '--all-tags'
      - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/trabajo-final-mlops2026-git'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'trabajo-final-mlops2026-git'
      - '--image=southamerica-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/trabajo-final-mlops2026-git:$COMMIT_SHA'
      - '--region=southamerica-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=1Gi'
      - '--cpu=1'
      - '--timeout=300'

images:
  - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/trabajo-final-mlops2026-git:$COMMIT_SHA'
  - 'southamerica-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/trabajo-final-mlops2026-git:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1200s'
